<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Bingo | Social Networking Game</title>
    <meta name="description" content="A fun and interactive social bingo game to connect with people.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <h1>Connect Bingo</h1>
        </div>
        <div class="controls">
            <button id="theme-toggle" class="btn-ghost theme-toggle" title="Toggle Theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            </button>
            <button id="new-card-btn" class="btn-primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                New Card
            </button>
        </div>
    </header>

    <main>
        <div class="progress-container">
            <span id="progress-text">0 / 24 Completed</span>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div id="bingo-grid" class="bingo-grid">
            <!-- Grid cells will be generated by JavaScript -->
        </div>
    </main>

    <!-- Cell Interaction Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Cell Detail</h2>
            <p id="prompt-text" class="prompt-text"></p>
            
            <div class="form-group">
                <label for="person-name">Who matches this?</label>
                <input type="text" id="person-name" placeholder="Enter person's name..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>Add a photo</label>
                <div id="image-upload-area" class="image-upload-area">
                    <div id="upload-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7"/><line x1="16" y1="5" x2="22" y2="5"/><line x1="19" y1="2" x2="19" y2="8"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                        <p style="font-size: 0.8rem; margin-top: 8px;">Click to Upload / Capture</p>
                    </div>
                    <img id="image-preview" src="" alt="Preview" style="display: none;">
                    <div id="preview-overlay" class="preview-overlay" style="display: none;">Tap to change</div>
                </div>
                <input type="file" id="file-input" accept="image/*" capture="user" style="display: none;">
            </div>

            <div class="modal-actions">
                <button id="cancel-btn" class="btn-ghost">Cancel</button>
                <button id="save-btn" class="btn-primary">Save & Mark</button>
            </div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Bingo Celebration 🎉 -->
    <div id="celebration" class="celebration">
        <div style="font-size: 3rem; margin-bottom: 0.5rem;">🎉</div>
        <h1>BINGO!</h1>
        <p>You've found enough connections!</p>
        <p style="font-size: 0.9rem; opacity: 0.7; margin-top: 0.25rem;">Keep playing to complete more!</p>
        <button id="celebration-close" class="btn-primary" style="margin-top: 2rem; background: white; color: #6366f1;">Fantastic! 🎊</button>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
